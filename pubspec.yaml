name: quest_guide
description: "Quest Guide — интерактивный туристический квест с геолокацией"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  supabase: ^2.10.2

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.1.0

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # UI & Design
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1

  # Media
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0
  audioplayers: ^6.4.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Utils
  intl: 0.20.2
  shared_preferences: ^2.3.2
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1
  just_audio: ^0.10.5
  http: ^1.2.2
  flutter_tts: ^4.2.3
  google_sign_in: 7.2.0
  google_fonts: ^8.0.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.0.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
